<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    ,<link rel="stylesheet" href="index.html">
    <title>Payment Page</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#e9b6dc;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            width:400px;
            background:#ea81c3;
            padding:30px;
            border-radius:15px;
            box-shadow:0 10px 20px rgba(0,0,0,.2);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
            color:#333;
        }

        .input-box{
            margin-bottom:15px;
        }

        label{
            display:block;
            margin-bottom:5px;
            color:#555;
            font-weight:bold;
        }

        input{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
            outline:none;
            transition:.3s;
        }

        input:focus{
            border-color:#e65cb4;
        }

        .row{
            display:flex;
            gap:10px;
        }

        .row .input-box{
            flex:1;
        }

        .amount{
            margin:20px 0;
            font-size:20px;
            text-align:center;
            color:#e65cb4;
            font-weight:bold;
        }

        button{
            width:100%;
            padding:15px;
            background:#e65cb4;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-size:18px;
            transition:.3s;
        }

        button:hover{
            background:#e65cb4;
        }

        .card-icons{
            text-align:center;
            margin-bottom:20px;
            font-size:35px;
        }
        .qr-code{
    text-align:center;
    margin:20px 0;
}

.qr-code img{
    width:220px;
    height:220px;
    border:2px solid #ddd;
    border-radius:10px;
    padding:8px;
}

.qr-code p{
    margin-top:10px;
    color:#666;
    font-size:14px;
}
    </style>

</head>
<body>

   
<div class="container">

    <h2>Payment</h2>


    <form>

        <div class="input-box">
            <label>Customer Name</label>
            <input type="text" placeholder="Full Name">
        </div>

        <div class="input-box">
            <label>Phone Number</label>
            <input type="text" maxlength="19" placeholder="1234 5678 9012 3456">
        </div>

        <div class="input-box">
            <label>Location</label>
            <input type="text" placeholder="Adress">
        </div>

        <div class="row">

            <div class="input-box">
                <label>Date</label>
                <input type="text" placeholder="DD/MM/YY">
            </div>

        </div>

        <div class="qr-code">
    <img src="https://i.ibb.co/VY2ZyFJY/photo-QR.jpg" alt="Payment QR Code">
    <p>Scan this QR Code to make your payment.</p>
</div>
<!-- HOME BUTTON -->
      <a href="index.html" class="home-btn">Back to Home</a>

      <button type="submit" class="submit-btn">Confirm Order </button>
      <div class="secure-note">Secured & encrypted payment</div>

    </form>
  </div>

</div>

<script>
  function handleOrder(e) {
    e.preventDefault();
    alert('✅ Order confirmed! Thank you for shopping with BARE 💕');
  }
</script>

</body>
</html>

</div>

</body>
</html>
